aid: zipline
name: Zipline
description: >-
  Zipline is a South San Francisco–headquartered autonomous logistics
  company operating the world's largest commercial drone delivery network,
  with more than two million customer deliveries flown across the United
  States, Rwanda, Ghana, Nigeria, Kenya, Côte d'Ivoire, and Japan. Zipline
  designs, builds, and operates two end-to-end aircraft platforms: Platform 1
  (P1, "Sparrow"), a long-range fixed-wing aircraft that launches from a
  catapult, parachutes payloads from altitude, and is used primarily for
  national-scale healthcare logistics — delivering blood products, vaccines,
  medicines, and lab samples to hospitals and clinics — and Platform 2 (P2),
  a short-range hybrid VTOL aircraft with an autonomous tethered "droid"
  delivery vehicle that lowers packages from a hovering aircraft directly to
  a designated point on the ground, enabling precision quick-commerce
  delivery from restaurants, retailers, pharmacies, and hospitals. Zipline's
  customer roster includes Walmart, OhioHealth, Michigan Medicine, Cleveland
  Clinic, Mayo Clinic Florida, MultiCare, Sweetgreen, GNC, Jet's Pizza, the
  governments of Rwanda, Ghana, Nigeria, and Kenya, and Japan's Toyota
  Tsusho, with the P2 platform actively scaling across the Dallas–Fort Worth
  Metroplex, Pea Ridge (AR), and expanding into Houston and Phoenix in 2026.
  The company also operates one of the largest civil autonomous aviation
  stacks in the world — proprietary detect-and-avoid, route planning,
  weather, fleet operations, and flight-control software — and in 2025
  received the first-ever FAA Part 135 BVLOS (beyond-visual-line-of-sight)
  operational approval permitting drone package delivery without visual
  observers. Zipline is a privately held company; its revenue model is
  drone-as-a-service contracts with healthcare systems, retailers, restaurant
  brands, and governments. There is no public developer API, SDK,
  OpenAPI/AsyncAPI specification, GitHub organization, status page,
  changelog, or self-service developer portal — integrations with customer
  systems (order management, EHR, WMS, dispatch) are delivered as
  managed enterprise integrations rather than as a public programmable API.
